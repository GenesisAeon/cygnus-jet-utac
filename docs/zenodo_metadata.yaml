upload_type: software

title: >
  cygnus-jet-utac: GenesisAeon Package 17 —
  Cygnus X-1 Relativistic Jet as UTAC System

description: |
  cygnus-jet-utac is GenesisAeon Package 17, modelling the Cygnus X-1 black hole
  binary system as a UTAC (Unified Theory of Adaptive Criticality) dynamical system.

  The package is calibrated against Prabu et al. (2026, Nature Astronomy,
  DOI: 10.1038/s41550-026-02828-3) and implements the full Diamond-Template
  interface for integration into the genesis-os ecosystem.

  Key scientific result: Γ_jet = arctanh(0.10)/2.2 ≈ 0.0456 — the first
  CREP-domain calibration for a stellar black hole system. This sub-critical
  value (Γ << 0.5) explains the "dancing" jet behaviour observed over 18 years
  of VLBI monitoring.

  The package includes:
  - Full 18-year relativistic jet simulation
  - Mirror-Machine for jet dance event detection
  - Benchmark validation against 6 Prabu 2026 observables (score ≥ 80/100)
  - Falsifiable prediction of future jet direction-change timestamps
  - CLI, Jupyter notebooks, and Zenodo-ready metadata export

